name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-24.04
            mainExe: LovelyGit
          - rid: win-x64
            runner: windows-2025
            mainExe: LovelyGit.exe
          - rid: win-arm64
            runner: windows-11-arm
            mainExe: LovelyGit.exe
          - rid: osx-x64
            runner: macos-15-intel
            mainExe: LovelyGit
          - rid: osx-arm64
            runner: macos-15
            mainExe: LovelyGit

    env:
      PROJECT_PATH: LovelyGit/LovelyGit.csproj
      FRONTEND_DIR: LovelyGit/Frontend
      PACK_ID: expressthat.lovelygit
      VPK_VERSION: 1.1.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$GITHUB_REF_NAME' is not a supported semver tag." >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: LovelyGit/Frontend/pnpm-lock.yaml

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET tools
        working-directory: LovelyGit
        run: dotnet tool restore

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: pnpm run prod

      - name: Restore .NET dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }} -r ${{ matrix.rid }}

      - name: Publish app
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration Release
          --framework net10.0
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output artifacts/publish/${{ matrix.rid }}

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk --version ${{ env.VPK_VERSION }}

      - name: Package with Velopack
        run: >
          vpk pack
          --packId ${{ env.PACK_ID }}
          --packVersion ${{ env.RELEASE_VERSION }}
          --packDir artifacts/publish/${{ matrix.rid }}
          --mainExe ${{ matrix.mainExe }}
          --runtime ${{ matrix.rid }}
          --channel ${{ matrix.rid }}
          --outputDir artifacts/velopack/${{ matrix.rid }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: velopack-${{ matrix.rid }}
          path: artifacts/velopack/${{ matrix.rid }}/**
          if-no-files-found: error

  draft-release:
    name: Draft GitHub release
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          name: LovelyGit ${{ github.ref_name }}
          files: release-artifacts/**/*
